<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engagement Party | Jessica & Nicolas</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Gilded Age Palette */
            --gold: #B8982E;
            --dark-gold: #4a5a28;
            --burgundy: #4a5a28;
            --forest-green: #4a5a28;   
            --cream: #eaeee2;   /* Background */       
            --bg: #264e36;      /* Dark Green Outer Background */         
        }

        body {
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 40px 20px; /* Padding for mobile breathing room */
            font-family: 'Cormorant Garamond', serif;
            color: var(--forest-green);
            min-height: 100vh;
        }

        /* Container to center everything and provide side spacing on desktop */
        .page-wrapper {
            width: 100%;
            max-width: 800px; /* Limits width on laptops to create the 1/4 side spacing */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Hero Card */
        .hero-card {
            width: 100%;
            background-color: var(--cream);
            border: 20px solid transparent;
            /* Gold Glitter texture frame */
            border-image: url('https://www.transparenttextures.com/patterns/gold-glitter.png') 30 round;
            outline: 6px double var(--gold);
            outline-offset: -16px;
            padding: 80px 40px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            position: relative;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
            animation: fadeIn 1.2s ease-out;
            overflow: hidden;
            z-index: 10;
            gap: 30px; 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Decorative Corners */
        .hero-card::before, .hero-card::after {
            content: "⚜";
            position: absolute;
            color: var(--gold);
            font-size: clamp(25px, 5vw, 45px); /* Responsive size */
            opacity: 0.6;
        }
        .hero-card::before { top: 30px; left: 30px; }
        .hero-card::after { top: 30px; right: 30px; }

        .engagement-banner {
            border-bottom: 2px solid var(--forest-green);
            display: inline-block;
            padding-bottom: 12px;
            margin: 0;
        }

        .engagement-banner h2 {
            font-size: clamp(20px, 4vw, 34px);
            letter-spacing: clamp(5px, 1vw, 12px);
            text-transform: uppercase;
            color: var(--burgundy);
            margin: 0;
            font-weight: 700;
        }

        .header-text-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .presence-text {
            letter-spacing: 5px;
            font-size: clamp(16px, 3vw, 24px);
            margin: 0;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--burgundy);
        }

        .celebrate-text {
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: clamp(14px, 2.5vw, 19px);
            margin: 0;
            opacity: 0.8;
            color: var(--burgundy);
        }

        /* Names in Burgundy */
        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(60px, 10vw, 115px); 
            color: var(--burgundy);
            margin: 0;
            font-weight: 400;
            line-height: 1.1;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.5);
        }

        .and {
            font-style: italic;
            font-size: clamp(30px, 5vw, 46px);
            margin: 5px 0;
            color: var(--burgundy);
            font-family: 'Cormorant Garamond', serif;
        }

        /* Photo Section */
        .photo-wrapper {
            margin: 20px 0;
            width: 85%;
            border: 1px solid var(--gold);
            padding: 10px;
            background: #fff;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        .couple-photo {
            width: 100%;
            height: auto;
            max-height: 500px;
            display: block;
            object-fit: cover;
            filter: contrast(1.02) saturate(0.9);
        }

        /* Location and Time inside Hero Card */
        .hero-location-time {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 10px;
        }

        .hero-location {
            font-weight: 400;
            letter-spacing: 3px;
            font-size: clamp(18px, 3vw, 26px);
            line-height: 1.4;
            margin: 0;
            color: var(--burgundy);
            text-transform: uppercase;
        }

        .hero-location strong {
            display: block;
            font-weight: 700;
            font-size: clamp(20px, 3.5vw, 30px);
            margin-bottom: 5px;
        }

        .hero-time {
            font-size: clamp(18px, 3vw, 24px);
            letter-spacing: 3px;
            color: var(--burgundy);
            font-weight: 600;
        }

        /* Logistics Section */
        .logistics-section {
            width: 100%;
            padding: 40px 20px; 
            background-color: var(--cream);
            box-sizing: border-box;
            text-align: center;
            margin-top: -2px; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px; 
        }

        .footer-message {
            font-size: clamp(18px, 3vw, 28px);
            letter-spacing: 2px;
            margin: 0;
            color: var(--forest-green);
            text-transform: uppercase;
            line-height: 1.6;
            font-weight: 600;
            font-style: italic;
        }

        .deadline {
            font-size: clamp(14px, 2.5vw, 20px);
            margin: 0;
            display: block;
            color: var(--burgundy);
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 700;
        }

        /* Language Switcher */
        .lang-switcher {
            width: 100%;
            margin-top: 20px;
            padding-top: 30px;
            border-top: 1px solid rgba(178, 147, 93, 0.3);
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .lang-btn-small {
            background: none;
            border: none;
            color: var(--forest-green);
            cursor: pointer;
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(18px, 2.5vw, 24px);
            letter-spacing: 2px;
            opacity: 0.7;
            text-transform: uppercase;
            font-weight: 600;
        }

        .lang-btn-small:hover { opacity: 1; color: var(--burgundy); }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <div class="hero-card">
            <div class="engagement-banner">
                <h2 id="banner-text">Engagement Party</h2>
            </div>

            <div class="header-text-group">
                <p class="presence-text" id="header-text">The Honor of Your Presence is Requested</p>
                <p class="celebrate-text" id="sub-header">To Celebrate the Engagement of</p>
            </div>
            
            <div class="names-group">
                <h1>Jessica Gutstein</h1>
                <div class="and" id="and-text">and</div>
                <h1>Nicolas Gachancipa</h1>
            </div>

            <div class="photo-wrapper">
                <img src="engagement_4_bw.jpeg" alt="Jessica and Nicolas" class="couple-photo" onerror="this.src='https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&q=80&w=1200'">
            </div>

            <div class="hero-location-time">
                <div class="hero-location">
                    <strong id="location-name">13384 LAKESIDE TERRACE</strong>
                    COOPER CITY, FLORIDA
                </div>
                <div class="hero-time" id="event-time">
                    at 7:00 PM
                </div>
            </div>
        </div>

        <div class="logistics-section">
            <p class="footer-message" id="footer-invite">
                A Soirée of Splendor and High Rejoicing<br>
                to commence the journey of a lifetime
            </p>
            
            <span class="deadline" id="rsvp-deadline">R.S.V.P. BY MAY 1ST</span>

            <div class="lang-switcher">
                <button class="lang-btn-small" onclick="updateLang('en')">English</button>
                <button class="lang-btn-small" onclick="updateLang('es')">Español</button>
                <button class="lang-btn-small" onclick="updateLang('it')">Italiano</button>
            </div>
        </div>
    </div>

    <script>
        const translations = {
            en: {
                banner: "Engagement Party",
                header: "The Honor of Your Presence is Requested",
                subHeader: "To Celebrate the Engagement of",
                and: "and",
                footer: "A Soirée of Splendor and High Rejoicing<br>to commence the journey of a lifetime",
                deadline: "R.S.V.P. BY MAY 1ST",
                time: "at 7:00 PM"
            },
            es: {
                banner: "Celebración de Compromiso",
                header: "Nos honraría contar con su presencia",
                subHeader: "para celebrar nuestro compromiso",
                and: "y",
                footer: "Una velada de esplendor y alegría<br>para comenzar el viaje de toda una vida",
                deadline: "Favor de confirmar antes del 1 de mayo",
                time: "a las 7:00 PM"
            },
            it: {
                banner: "Festa di Fidanzamento",
                header: "Abbiamo l'onore di richiedere la vostra presenza",
                subHeader: "Per celebrare il fidanzamento di",
                and: "e",
                footer: "Una serata di splendore e grande gioia<br>per iniziare il viaggio di una vita",
                deadline: "R.S.V.P. ENTRO IL 1° MAGGIO",
                time: "alle 19:00"
            }
        };

        function updateLang(lang) {
            const data = translations[lang];
            if (!data) return;

            document.getElementById('banner-text').innerText = data.banner;
            document.getElementById('header-text').innerText = data.header;
            document.getElementById('sub-header').innerText = data.subHeader;
            document.getElementById('and-text').innerText = data.and;
            document.getElementById('footer-invite').innerHTML = data.footer;
            document.getElementById('rsvp-deadline').innerText = data.deadline;
            document.getElementById('event-time').innerText = data.time;
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const lang = params.get('lang') || 'en';
            updateLang(lang);
        };
    </script>
</body>
</html>
